        <h1>Swisscoast AG — DLT Innovation on Hedera Hashgraph</h1>
        <p>Swisscoast AG is a Swiss blockchain innovation company building decentralized finance (DeFi) protocols on Hedera Hashgraph. Founded in 2003 and headquartered in Pfäffikon SZ, Switzerland.</p>

        <h2>Products</h2>
        <ul>
          <li><strong>HLiquity</strong> — Decentralized borrowing protocol on Hedera Hashgraph. Borrow HCHF against HBAR at 0% interest.</li>
          <li><strong>HCHF</strong> — The first private digital Swiss Franc stablecoin on Hedera, pegged 1:1 to CHF.</li>
          <li><strong>HORUS</strong> — Decentralized prediction market platform on Hedera Hashgraph.</li>
          <li><strong>dCHF</strong> — CHF-pegged stablecoin on Ethereum.</li>
        </ul>

        <h2>Services</h2>
        <ul>
          <li>Smart contract development on Hedera Hashgraph and EVM chains</li>
          <li>DLT strategy consulting and architecture design</li>
          <li>Tokenization and digital asset advisory</li>
          <li>Web3 infrastructure and protocol development</li>
          <li>Blockchain security auditing</li>
        </ul>

        <h2>About</h2>
        <p>Swisscoast AG specializes in distributed ledger technology with a focus on the Hedera Hashgraph ecosystem. The team includes Andreas Wegmann (CEO), Roman Brunner (CTO), Stefan Gries (Head of Operations), and developers Silas Müller and Toni Caradonna.</p>
